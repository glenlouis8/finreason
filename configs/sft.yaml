model:
  name: Qwen/Qwen2.5-7B-Instruct
  max_seq_length: 2048

qlora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

training:
  output_dir: checkpoints/sft
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  optim: paged_adamw_8bit
  fp16: false
  bf16: true
  logging_steps: 10
  save_strategy: epoch
  seed: 42

data:
  train_path: data/sft_train.jsonl
  eval_path: data/sft_eval.jsonl

wandb:
  project: finreason
  run_name: sft-qwen2.5-7b

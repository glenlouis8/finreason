# Real-model Deployment — vLLM serving the AWQ FinReason model on K8s.
# Uses vLLM's PUBLIC image (no custom build needed). Model is public on the
# Hub, so no HF token required. Needs a GPU node + NVIDIA device plugin
# (see RUNBOOK-k3s.md). On the CPU kind cluster this won't schedule — expected.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finreason-vllm
  labels:
    app: finreason-vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finreason-vllm
  template:
    metadata:
      labels:
        app: finreason-vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          command:                       # explicit = unambiguous across image versions
            - vllm
            - serve
            - glen-louis/finreason-qwen2.5-7b-awq
            - --quantization=awq
            - --max-model-len=4096
            - --gpu-memory-utilization=0.90
            - --port=8000
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 1          # 1 GPU (needs device plugin on the node)
          readinessProbe:                # 7B AWQ takes ~30-60s to load
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: finreason-vllm
spec:
  type: ClusterIP
  selector:
    app: finreason-vllm
  ports:
    - port: 8000
      targetPort: 8000
